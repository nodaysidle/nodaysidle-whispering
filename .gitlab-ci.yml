workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

stages:
  - verify
  - package

.default_cache:
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
      - src-tauri/target/
    policy: pull-push

verify:web:
  stage: verify
  image: node:20-bookworm
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
    policy: pull-push
  variables:
    npm_config_cache: "$CI_PROJECT_DIR/.npm"
  script:
    - npm ci
    - npm run build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

package:macos:
  stage: package
  tags:
    - macos
  variables:
    INSTALL_DIR: "$CI_PROJECT_DIR/.ci-install"
    npm_config_cache: "$CI_PROJECT_DIR/.npm"
  script:
    - node --version
    - npm --version
    - rustc --version
    - cargo --version
    - npm ci
    - bash scripts/package-macos.sh
    - APP_PATH="$INSTALL_DIR/NoDaysIdle Whispering.app"
    - test -d "$APP_PATH"
    - ZIP_NAME="NoDaysIdle-Whispering-${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}.zip"
    - ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_NAME"
  artifacts:
    name: "nodaysidle-whispering-${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - NoDaysIdle-Whispering-*.zip
      - .ci-install/NoDaysIdle Whispering.app
    expire_in: 1 week
    when: always
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
