workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

stages:
  - verify
  - package

.default_cache:
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
      - src-tauri/target/
    policy: pull-push

verify:web:
  stage: verify
  tags:
    - macos
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
    policy: pull-push
  variables:
    npm_config_cache: "$CI_PROJECT_DIR/.npm"
  script:
    - bash scripts/ci-local.sh verify
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

package:macos:
  stage: package
  tags:
    - macos
  variables:
    INSTALL_DIR: "$CI_PROJECT_DIR/.ci-install"
    WHISPER_MODEL_PATH: "/Users/archuser/.gitlab-runner/models/ggml-base.en-q5_1.bin"
    npm_config_cache: "$CI_PROJECT_DIR/.npm"
  script:
    - node --version
    - npm --version
    - rustc --version
    - cargo --version
    - export ZIP_OUTPUT="$CI_PROJECT_DIR/artifacts/NoDaysIdle-Whispering-${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}.zip"
    - bash scripts/ci-local.sh package
    - APP_PATH="$INSTALL_DIR/NoDaysIdle Whispering.app"
    - test -d "$APP_PATH"
    - test -f "$ZIP_OUTPUT"
  artifacts:
    name: "nodaysidle-whispering-${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - artifacts/*.zip
    expire_in: 1 week
    when: always
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
